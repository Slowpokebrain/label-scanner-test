<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Box Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0a0a0a; --surface:#141414; --card:#222222;
    --accent:#00e5ff; --accent-h:#40eeff;
    --green:#4caf82;
    --text:#e8eaf6; --muted:#7b7f9e; --border:#333333;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
       display:flex;flex-direction:column;overflow:hidden;}

  /* HEADER */
  header{background:var(--surface);border-bottom:2px solid var(--border);padding:8px 12px;
         display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
  .h-brand{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:4px;
           color:var(--accent);text-shadow:0 0 10px rgba(0,229,255,.4);white-space:nowrap;}
  .h-controls{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .h-text-btn{height:34px;display:flex;align-items:center;justify-content:center;
              background:var(--card);border:1.5px solid var(--accent);border-radius:8px;
              cursor:pointer;flex-shrink:0;box-shadow:0 0 6px rgba(0,229,255,.2);
              font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:1.5px;
              color:var(--accent);padding:0 10px;white-space:nowrap;}
  .h-text-btn:active{opacity:.7;}

  /* CONTENT AREA */
  .bottom-area{flex:1;display:flex;flex-direction:column;gap:12px;min-height:0;overflow:hidden;}
  .content{flex:1;display:flex;flex-direction:column;padding:12px 14px;gap:12px;min-height:0;overflow:hidden;}
  .results-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;overflow-y:auto;transition:border-color .3s;flex:0 1 auto;min-height:0;}

  /* SCANNER */
  .scan-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;overflow:hidden;flex-shrink:0;}
  .scan-ready{background:var(--card);cursor:pointer;display:flex;flex-direction:column;
              align-items:center;justify-content:center;gap:12px;padding:18px 20px;
              user-select:none;transition:background .15s;min-height:110px;}
  .scan-ready:active{background:#1e2235;}
  .scan-ready-icon{position:relative;width:100px;height:60px;}
  .sri-corner{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid;}
  .sri-tl{top:0;left:0;border-width:3px 0 0 3px;}
  .sri-tr{top:0;right:0;border-width:3px 3px 0 0;}
  .sri-bl{bottom:0;left:0;border-width:0 0 3px 3px;}
  .sri-br{bottom:0;right:0;border-width:0 3px 3px 0;}
  .sri-inner{position:absolute;inset:10px 12px;display:flex;align-items:stretch;gap:4px;}
  .sri-bar{flex:1;background:var(--accent);border-radius:1px;}
  .sri-wide{flex:2;}
  .scan-ready-label{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;
                    color:var(--accent);text-shadow:0 0 12px rgba(0,229,255,.4);}

  /* VIEWPORT */
  .scan-viewport{position:relative;width:100%;background:#000;overflow:hidden;height:40vw;max-height:230px;}
  .scan-viewport video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #crop-canvas{display:none;}
  .scan-overlay{position:absolute;inset:0;pointer-events:none;}
  .aim-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
             width:92%;height:72%;border:2px solid var(--accent);border-radius:6px;
             box-shadow:0 0 0 1200px rgba(0,0,0,.5);animation:aim-pulse 2s ease-in-out infinite;}
  .aim-corner{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid;}
  .aim-corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
  .aim-corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
  .aim-corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
  .aim-corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
  .scan-line{position:absolute;left:2%;right:2%;height:2px;
             background:linear-gradient(90deg,transparent,var(--accent),transparent);
             animation:scan-line 1.8s ease-in-out infinite;}
  @keyframes aim-pulse{
    0%,100%{border-color:var(--accent);box-shadow:0 0 0 1200px rgba(0,0,0,.5),0 0 12px rgba(0,229,255,.3);}
    50%{border-color:var(--accent-h);box-shadow:0 0 0 1200px rgba(0,0,0,.5),0 0 22px rgba(0,229,255,.6);}
  }
  @keyframes scan-line{0%{top:15%;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:85%;opacity:0;}}

  /* PRODUCT ID CARD (between scanner and fields) */
  .pid-card{background:var(--surface);border:2px solid rgba(0,229,255,.45);border-radius:14px;
            padding:12px 14px;text-align:center;box-shadow:0 0 16px rgba(0,229,255,.1);
            display:none;flex-shrink:0;}
  .pid-card-label{font-size:.55rem;text-transform:uppercase;letter-spacing:2px;
                  color:var(--accent);margin-bottom:4px;font-weight:600;}
  .pid-card-val{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:8px;
                color:var(--accent);text-shadow:0 0 16px rgba(0,229,255,.5);line-height:1;}

  /* RESULTS */
  .results-card.has-data{border-color:rgba(0,229,255,.35);}
  .results-grid{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}

  .field-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);
             border-radius:10px;border:1px solid var(--border);transition:border-color .2s;}
  .field-row.filled{border-color:rgba(0,229,255,.2);}
  .field-info{flex:1;min-width:0;}
  .field-label{font-size:.6rem;letter-spacing:.6px;color:var(--accent);line-height:1;font-weight:600;}
  .field-value{font-family:'Inter',sans-serif;font-weight:600;font-size:.95rem;color:#fff;
               line-height:1.3;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;user-select:text;-webkit-user-select:text;}
  .field-value.empty{color:var(--border);font-weight:400;font-size:.82rem;}
  /* 5-digit PID highlight in GTIN row — white */
  .gtin-pid{color:#fff;}

  /* CONFIRM */
  .confirm-btn{width:100%;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
               letter-spacing:3px;border-radius:12px;border:none;background:var(--accent);
               color:#000;cursor:pointer;transition:all .2s;}
  .confirm-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
  .confirm-btn:not(:disabled):active{transform:scale(.98);}

  .flash{position:fixed;inset:0;background:rgba(0,229,255,.12);pointer-events:none;
         opacity:0;transition:opacity .15s;z-index:200;}
  .flash.on{opacity:1;}
  @keyframes fi{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<header>
  <div class="h-brand">Pure Scan</div>
  <div class="h-controls">
    <div class="h-text-btn" onclick="clearScan()">CLEAR</div>
    <div class="h-text-btn" id="fs-btn" onclick="toggleFullscreen()">FULL SCREEN: OFF</div>
  </div>
</header>

<div class="content">

  <!-- SCANNER -->
  <div class="scan-card">
    <div class="scan-ready" id="scan-ready" onclick="toggleScan()">
      <div class="scan-ready-icon">
        <div class="sri-corner sri-tl"></div><div class="sri-corner sri-tr"></div>
        <div class="sri-corner sri-bl"></div><div class="sri-corner sri-br"></div>
        <div class="sri-inner">
          <div class="sri-bar"></div><div class="sri-bar"></div>
          <div class="sri-bar sri-wide"></div><div class="sri-bar"></div>
          <div class="sri-bar sri-wide"></div>
        </div>
      </div>
      <div class="scan-ready-label">TAP TO SCAN BARCODE</div>
    </div>
    <div class="scan-viewport" id="scan-viewport" style="display:none;" onclick="toggleScan()">
      <video id="video" playsinline muted></video>
      <canvas id="crop-canvas"></canvas>
      <div class="scan-overlay">
        <div class="aim-frame" id="aim-frame">
          <div class="aim-corner tl"></div><div class="aim-corner tr"></div>
          <div class="aim-corner bl"></div><div class="aim-corner br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PRODUCT ID — appears after scan, between scanner and fields -->
  <div class="pid-card" id="pid-card">
    <div class="pid-card-label">Product ID</div>
    <div class="pid-card-val" id="pid-value"></div>
  </div>

  <div class="bottom-area">
  <!-- FIELD RESULTS -->
  <div class="results-card" id="results-card">
    <div class="results-grid">

      <div class="field-row" id="row-gtin">
        <div class="field-info">
          <div class="field-label"><span style="color:var(--accent);">GTIN / Product ID</span></div>
          <div class="field-value empty" id="val-gtin">—</div>
        </div>
      </div>

      <div style="display:flex;gap:8px;">
        <div class="field-row" id="row-weight" style="flex:1;min-width:0;">
          <div class="field-info">
            <div class="field-label">Weight (lbs)</div>
            <div class="field-value empty" id="val-weight">—</div>
          </div>
        </div>
        <div class="field-row" id="row-date" style="flex:1;min-width:0;">
          <div class="field-info">
            <div class="field-label">Pack Date</div>
            <div class="field-value empty" id="val-date">—</div>
          </div>
        </div>
      </div>

      <div class="field-row" id="row-serial">
        <div class="field-info">
          <div class="field-label">Serial Number</div>
          <div class="field-value empty" id="val-serial">—</div>
        </div>
      </div>

      <div class="field-row" id="row-inspect">
        <div class="field-info">
          <div class="field-label">Inspection ID</div>
          <div class="field-value" id="val-inspect" style="cursor:pointer;" onclick="editInspect()">P-47016</div>
        </div>
        <div style="font-size:.65rem;color:var(--muted);cursor:pointer;padding-left:4px;" onclick="editInspect()">✏</div>
      </div>

      <div id="extra-fields"></div>

    </div>
  </div>

  <button class="confirm-btn" id="confirm-btn" onclick="confirmScan()" disabled>CONFIRM</button>
  </div><!-- /bottom-area -->

</div><!-- /content -->

<div class="flash" id="flash"></div>

<script>
let scanning = false, codeReader = null, scanData = null, animFrame = null;

/* ===== GS1 CATALOGUE ===== */
const GS1_AI = {
  '00':  {name:'Serial Shipping Container', len:18, fixed:true},
  '01':  {name:'GTIN / Product ID',         len:14, fixed:true},
  '02':  {name:'GTIN of Contents',          len:14, fixed:true},
  '10':  {name:'Batch / Lot Number',        len:20, fixed:false},
  '11':  {name:'Production Date',           len:6,  fixed:true, fmt:'date'},
  '12':  {name:'Due Date',                  len:6,  fixed:true, fmt:'date'},
  '13':  {name:'Packaging Date',            len:6,  fixed:true, fmt:'date'},
  '15':  {name:'Best Before Date',          len:6,  fixed:true, fmt:'date'},
  '17':  {name:'Expiration Date',           len:6,  fixed:true, fmt:'date'},
  '20':  {name:'Product Variant',           len:2,  fixed:true},
  '21':  {name:'Serial Number',             len:20, fixed:false},
  '22':  {name:'Consumer Product Variant',  len:20, fixed:false},
  '30':  {name:'Item Count',                len:8,  fixed:false},
  '37':  {name:'Units Contained',           len:8,  fixed:false},
  '3102':{name:'Net Weight (kg)',           len:6,  fixed:true, fmt:'w2'},
  '3202':{name:'Net Weight (lbs)',          len:6,  fixed:true, fmt:'w2'},
  '3302':{name:'Gross Weight (kg)',         len:6,  fixed:true, fmt:'w2'},
  '400': {name:'Customer PO Number',        len:30, fixed:false},
  '401': {name:'Consignment Number',        len:30, fixed:false},
  '402': {name:'Shipment ID',               len:17, fixed:true},
  '410': {name:'Ship-To GLN',               len:13, fixed:true},
  '420': {name:'Ship-To Postal Code',       len:20, fixed:false},
  '422': {name:'Country of Origin',         len:3,  fixed:true},
  '7002':{name:'Meat Cut Type',             len:30, fixed:false},
  '90':  {name:'Internal Use',              len:30, fixed:false},
};
const PRIMARY_AIS = new Set(['01','13','3202','21']);

/* ===== PARSER ===== */
function parseGS1(raw) {
  let data = raw.startsWith(']C1') ? raw.slice(3) : raw;
  const SEP = '\x1d';
  const result = {};
  let i = 0;
  while (i < data.length) {
    if (data[i] === SEP) { i++; continue; }
    let matched = false;
    for (const al of [4,3,2]) {
      const ai = data.substr(i, al);
      if (!GS1_AI[ai]) continue;
      const def = GS1_AI[ai];
      i += al;
      if (def.fixed) { result[ai] = data.substr(i, def.len); i += def.len; }
      else {
        const end = data.indexOf(SEP, i);
        result[ai] = end === -1 ? data.substr(i) : data.substr(i, end - i);
        i = end === -1 ? data.length : end;
      }
      matched = true; break;
    }
    if (!matched) i++;
  }
  return result;
}

/* ===== FORMATTERS ===== */
function formatDate(s) {
  if (!s || s.length !== 6) return s;
  return `${s.substr(2,2)}/${s.substr(4,2)}/20${s.substr(0,2)}`;
}
function formatW2(s) { return s ? (parseInt(s,10)/100).toFixed(2)+' lbs' : s; }
function applyFmt(v, fmt) {
  if (fmt==='date') return formatDate(v);
  if (fmt==='w2')   return formatW2(v);
  return v;
}
function extractPID(gtin) {
  return (gtin && gtin.length >= 13) ? gtin.substr(8,5) : null;
}
function gtinHTML(gtin) {
  if (!gtin || gtin.length < 14) return gtin||'';
  return gtin.substr(0,8)
    + `<span class="gtin-pid">${gtin.substr(8,5)}</span>`
    + gtin.substr(13);
}

/* ===== DISPLAY ===== */
function displayData(parsed, raw) {
  scanData = {parsed, raw};
  const gtin = parsed['01']||'', date = parsed['13']||'',
        wt   = parsed['3202']||'', ser = parsed['21']||'';
  const pid = extractPID(gtin);

  // Product ID card (between scanner and fields)
  const pidCard = document.getElementById('pid-card');
  const pidVal  = document.getElementById('pid-value');
  if (pid) {
    pidVal.textContent = pid;
    pidCard.style.display = 'block';
  } else {
    pidCard.style.display = 'none';
    pidVal.textContent = '';
  }

  // GTIN
  const gtinEl = document.getElementById('val-gtin');
  if (gtin) {
    gtinEl.innerHTML = gtinHTML(gtin);
    gtinEl.classList.remove('empty');
    document.getElementById('row-gtin').classList.add('filled');
  } else {
    gtinEl.textContent = '—'; gtinEl.classList.add('empty');
    document.getElementById('row-gtin').classList.remove('filled');
  }

  setField('val-date',   'row-date',   date, formatDate);
  setField('val-weight', 'row-weight', wt,   formatW2);
  setField('val-serial', 'row-serial', ser);
  renderExtras(parsed);

  document.getElementById('results-card').classList.add('has-data');
  document.getElementById('confirm-btn').disabled = !(gtin && date);
  flashScreen();
}

function setField(id, rowId, val, fmt) {
  const el = document.getElementById(id), row = document.getElementById(rowId);
  if (val) {
    el.textContent = fmt ? fmt(val) : val;
    el.classList.remove('empty'); row.classList.add('filled');
  } else {
    el.textContent = '—'; el.classList.add('empty'); row.classList.remove('filled');
  }
}

function renderExtras(parsed) {
  const box = document.getElementById('extra-fields');
  box.innerHTML = '';
  Object.keys(parsed).filter(ai => !PRIMARY_AIS.has(ai)).forEach(ai => {
    const def  = GS1_AI[ai];
    const name = def ? def.name : `GS1 AI (${ai})`;
    const dval = def ? applyFmt(parsed[ai], def.fmt) : parsed[ai];
    const row  = document.createElement('div');
    row.className = 'field-row filled';
    row.innerHTML = `<div class="field-info"><div class="field-label">${name}</div><div class="field-value">${dval}</div></div>`;
    box.appendChild(row);
  });
}

/* ===== CROP (object-fit:cover aware) ===== */
function getCropCanvas() {
  const vp=document.getElementById('scan-viewport'), vid=document.getElementById('video');
  const cvs=document.getElementById('crop-canvas');
  const cW=vp.clientWidth, cH=vp.clientHeight, vW=vid.videoWidth, vH=vid.videoHeight;
  if (!vW||!vH) return vid;
  const cAR=cW/cH, vAR=vW/vH;
  let scale,offX=0,offY=0;
  if (vAR>cAR){scale=vH/cH;offX=(vW-cW*scale)/2;}
  else{scale=vW/cW;offY=(vH-cH*scale)/2;}
  const fCW=cW*0.92,fCH=cH*0.72,fCX=(cW-fCW)/2,fCY=(cH-fCH)/2;
  const fVX=fCX*scale+offX,fVY=fCY*scale+offY,fVW=fCW*scale,fVH=fCH*scale;
  cvs.width=Math.round(fVW)||1; cvs.height=Math.round(fVH)||1;
  cvs.getContext('2d').drawImage(vid,fVX,fVY,fVW,fVH,0,0,cvs.width,cvs.height);
  return cvs;
}

/* ===== SCANNER ===== */
function showReady(){document.getElementById('scan-ready').style.display='flex';document.getElementById('scan-viewport').style.display='none';}
function showViewport(){document.getElementById('scan-ready').style.display='none';document.getElementById('scan-viewport').style.display='block';}
function toggleScan(){ scanning?(stopScan(),showReady()):startScan(); }

async function startScan() {
  showViewport(); scanning=true;
  try {
    const vid=document.getElementById('video');
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}
    });
    vid.srcObject=stream; await vid.play();
    if ('BarcodeDetector' in window) {
      const det=new BarcodeDetector({formats:['code_128','ean_13','ean_8','upc_a','upc_e','itf','pdf417']});
      const loop=async()=>{
        if(!scanning)return;
        try{
          const bc=await det.detect(getCropCanvas());
          if(bc.length){const p=parseGS1(bc[0].rawValue);if(Object.keys(p).length){stopScan();showReady();displayData(p,bc[0].rawValue);return;}}
        }catch(e){}
        animFrame=requestAnimationFrame(loop);
      };
      animFrame=requestAnimationFrame(loop);
    } else {
      const s=document.createElement('script');
      s.src='https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
      s.onload=()=>{
        const Z=window.ZXing,h=new Map();
        h.set(Z.DecodeHintType.POSSIBLE_FORMATS,[Z.BarcodeFormat.CODE_128,Z.BarcodeFormat.EAN_13]);
        h.set(Z.DecodeHintType.TRY_HARDER,true);
        codeReader=new Z.BrowserMultiFormatReader(h,250);
        codeReader.decodeFromStream(vid.srcObject,vid,(res)=>{
          if(res&&scanning){const p=parseGS1(res.getText());if(Object.keys(p).length){stopScan();showReady();displayData(p,res.getText());}}
        });
      };
      document.head.appendChild(s);
    }
  } catch(e){stopScan();showReady();}
}

function stopScan(){
  scanning=false;
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}
  const vid=document.getElementById('video');
  if(vid&&vid.srcObject){vid.srcObject.getTracks().forEach(t=>t.stop());vid.srcObject=null;}
}

/* ===== CLEAR ===== */
function clearScan(){
  stopScan(); scanData=null;
  document.getElementById('pid-card').style.display='none';
  document.getElementById('pid-value').textContent='';
  ['val-gtin','val-date','val-weight','val-serial'].forEach(id=>{
    const el=document.getElementById(id);el.textContent='—';el.classList.add('empty');
  });
  ['row-gtin','row-date','row-weight','row-serial'].forEach(id=>document.getElementById(id).classList.remove('filled'));
  document.getElementById('extra-fields').innerHTML='';
  document.getElementById('results-card').classList.remove('has-data');
  document.getElementById('confirm-btn').disabled=true;
  showReady();
}

/* ===== EDIT FIELDS ===== */
function editInspect(){
  const cur=document.getElementById('val-inspect').textContent.trim();
  const v=prompt('Inspection ID:',cur);
  if(v!==null&&v.trim())document.getElementById('val-inspect').textContent=v.trim();
}

/* ===== CONFIRM ===== */
function confirmScan(){
  if(!scanData)return;
  console.log('Payload:',{productId:extractPID(scanData.parsed['01']||''),allFields:scanData.parsed,inspectionId:document.getElementById('val-inspect').textContent.trim(),confirmedAt:new Date().toISOString()});
  flashScreen();showToast('Order confirmed!');
}
function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;padding:10px 20px;border-radius:10px;z-index:300;animation:fi .2s ease;white-space:nowrap;`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}
function flashScreen(){const f=document.getElementById('flash');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),200);}

/* ===== FULLSCREEN ===== */
function toggleFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}
  else{document.exitFullscreen().catch(()=>{});}
}

/* ===== SUPPRESS CHROME POPUPS ===== */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());

/* ===== HEIGHT FIX ===== */
function fixHeight() {
  document.body.style.height = window.innerHeight + 'px';
}
fixHeight();
window.addEventListener('resize', fixHeight);
document.addEventListener('fullscreenchange', () => {
  setTimeout(fixHeight, 50);
  const btn = document.getElementById('fs-btn');
  if (btn) btn.textContent = document.fullscreenElement ? 'FULL SCREEN: ON' : 'FULL SCREEN: OFF';
});
</script>
</body>
</html>
