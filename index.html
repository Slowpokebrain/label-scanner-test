<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Box Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0f1117; --surface:#1a1d27; --card:#22263a;
    --accent:#00e5ff; --accent-h:#40eeff;
    --green:#4caf82; --red:#e05c5c;
    --text:#e8eaf6; --muted:#7b7f9e; --border:#2e3250;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;height:100dvh;}

  /* HEADER */
  header{background:var(--surface);border-bottom:2px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
  .h-refresh{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1.5px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;}
  .h-refresh:active{border-color:var(--accent);}
  .h-refresh svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  #pid-display{flex:1;justify-content:center;display:none;}
  .pid-box{background:var(--card);border:1.5px solid rgba(0,229,255,.45);border-radius:10px;padding:5px 16px;text-align:center;box-shadow:0 0 14px rgba(0,229,255,.15);}
  .pid-label{font-size:.48rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:1px;}
  .pid-val{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:5px;color:var(--accent);text-shadow:0 0 12px rgba(0,229,255,.5);line-height:1;}
  .h-win-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;flex-shrink:0;}
  .h-win-btn:active{border-color:var(--accent);}
  .h-win-btn svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* SCROLL AREA */
  .scroll-area{flex:1;overflow-y:auto;padding:12px 14px 12px;display:flex;flex-direction:column;gap:12px;}

  /* SCANNER */
  .scan-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;overflow:hidden;flex-shrink:0;}
  .scan-ready{background:var(--card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:18px 20px;user-select:none;transition:background .15s;min-height:110px;}
  .scan-ready:active{background:#1e2235;}
  .scan-ready-icon{position:relative;width:100px;height:60px;}
  .sri-corner{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid;}
  .sri-tl{top:0;left:0;border-width:3px 0 0 3px;}
  .sri-tr{top:0;right:0;border-width:3px 3px 0 0;}
  .sri-bl{bottom:0;left:0;border-width:0 0 3px 3px;}
  .sri-br{bottom:0;right:0;border-width:0 3px 3px 0;}
  .sri-inner{position:absolute;inset:10px 12px;display:flex;align-items:stretch;gap:4px;}
  .sri-bar{flex:1;background:var(--accent);border-radius:1px;}
  .sri-wide{flex:2;}
  .scan-ready-label{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--accent);text-shadow:0 0 12px rgba(0,229,255,.4);}

  /* VIEWPORT */
  .scan-viewport{position:relative;width:100%;background:#000;overflow:hidden;height:40vw;max-height:230px;}
  .scan-viewport video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #crop-canvas{display:none;}
  .scan-overlay{position:absolute;inset:0;pointer-events:none;}
  .aim-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;height:72%;border:2px solid var(--accent);border-radius:6px;box-shadow:0 0 0 1200px rgba(0,0,0,.5);animation:aim-pulse 2s ease-in-out infinite;}
  .aim-corner{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid;}
  .aim-corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
  .aim-corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
  .aim-corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
  .aim-corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
  .scan-line{position:absolute;left:2%;right:2%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan-line 1.8s ease-in-out infinite;}
  @keyframes aim-pulse{0%,100%{border-color:var(--accent);box-shadow:0 0 0 1200px rgba(0,0,0,.5),0 0 12px rgba(0,229,255,.3);}50%{border-color:var(--accent-h);box-shadow:0 0 0 1200px rgba(0,0,0,.5),0 0 22px rgba(0,229,255,.6);}}
  @keyframes scan-line{0%{top:15%;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:85%;opacity:0;}}

  /* RESULTS */
  .results-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .3s;}
  .results-card.has-data{border-color:rgba(0,229,255,.35);}
  .results-grid{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}

  .field-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:10px;border:1px solid var(--border);transition:border-color .2s;}
  .field-row.filled{border-color:rgba(0,229,255,.2);}
  .field-info{flex:1;min-width:0;}
  /* Label = theme accent color */
  .field-label{font-size:.6rem;letter-spacing:.6px;color:var(--accent);line-height:1;font-weight:600;}
  /* Value = Inter, white */
  .field-value{font-family:'Inter',sans-serif;font-weight:600;font-size:.95rem;color:#fff;line-height:1.3;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .field-value.empty{color:var(--border);font-weight:400;font-size:.82rem;}
  .gtin-pid{color:var(--accent);text-shadow:0 0 8px rgba(0,229,255,.5);}

  /* FIXED CONFIRM FOOTER */
  .confirm-footer{padding:10px 14px max(16px, env(safe-area-inset-bottom));flex-shrink:0;background:var(--bg);}
  .confirm-btn{width:100%;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;border-radius:12px;border:none;background:var(--accent);color:#000;cursor:pointer;transition:all .2s;}
  .confirm-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
  .confirm-btn:not(:disabled):active{transform:scale(.98);}

  .flash{position:fixed;inset:0;background:rgba(0,229,255,.12);pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;}
  .flash.on{opacity:1;}
  @keyframes fi{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<header>
  <div class="h-refresh" onclick="clearScan()">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
  </div>

  <div id="pid-display" style="flex:1;display:none;justify-content:center;">
    <div class="pid-box">
      <div class="pid-label">Product ID</div>
      <div class="pid-val" id="pid-value"></div>
    </div>
  </div>

  <div class="h-win-btn" id="win-btn" onclick="toggleFullscreen()">
    <svg id="win-icon" viewBox="0 0 24 24">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
  </div>
</header>

<div class="scroll-area">

  <div class="scan-card">
    <div class="scan-ready" id="scan-ready" onclick="toggleScan()">
      <div class="scan-ready-icon">
        <div class="sri-corner sri-tl"></div><div class="sri-corner sri-tr"></div>
        <div class="sri-corner sri-bl"></div><div class="sri-corner sri-br"></div>
        <div class="sri-inner">
          <div class="sri-bar"></div><div class="sri-bar"></div>
          <div class="sri-bar sri-wide"></div><div class="sri-bar"></div>
          <div class="sri-bar sri-wide"></div>
        </div>
      </div>
      <div class="scan-ready-label">TAP TO SCAN BARCODE</div>
    </div>

    <div class="scan-viewport" id="scan-viewport" style="display:none;" onclick="toggleScan()">
      <video id="video" playsinline muted></video>
      <canvas id="crop-canvas"></canvas>
      <div class="scan-overlay">
        <div class="aim-frame" id="aim-frame">
          <div class="aim-corner tl"></div><div class="aim-corner tr"></div>
          <div class="aim-corner bl"></div><div class="aim-corner br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="results-card" id="results-card">
    <div class="results-grid" id="results-grid">

      <div class="field-row" id="row-gtin">
        <div class="field-info">
          <div class="field-label">GTIN / Product ID</div>
          <div class="field-value empty" id="val-gtin">—</div>
        </div>
      </div>

      <!-- Weight + Pack Date side by side -->
      <div style="display:flex;gap:8px;">
        <div class="field-row" id="row-weight" style="flex:1;min-width:0;">
          <div class="field-info">
            <div class="field-label">Weight (lbs)</div>
            <div class="field-value empty" id="val-weight">—</div>
          </div>
        </div>
        <div class="field-row" id="row-date" style="flex:1;min-width:0;">
          <div class="field-info">
            <div class="field-label">Pack Date</div>
            <div class="field-value empty" id="val-date">—</div>
          </div>
        </div>
      </div>

      <div class="field-row" id="row-serial">
        <div class="field-info">
          <div class="field-label">Serial Number</div>
          <div class="field-value empty" id="val-serial">—</div>
        </div>
      </div>

      <div class="field-row" id="row-inspect">
        <div class="field-info">
          <div class="field-label">Inspection ID</div>
          <div class="field-value" id="val-inspect" style="cursor:pointer;" onclick="editInspect()">P-47016</div>
        </div>
        <div style="font-size:.65rem;color:var(--muted);cursor:pointer;padding-left:4px;" onclick="editInspect()">✏</div>
      </div>

      <!-- Extra GS1 fields appended here -->
      <div id="extra-fields"></div>

    </div>
  </div>

</div><!-- /scroll-area -->

<!-- Confirm always visible at bottom -->
<div class="confirm-footer">
  <button class="confirm-btn" id="confirm-btn" onclick="confirmScan()" disabled>CONFIRM</button>
</div>

<div class="flash" id="flash"></div>

<script>
let scanning = false, codeReader = null, scanData = null, animFrame = null;

/* ===== GS1 CATALOGUE ===== */
const GS1_AI = {
  '00':  {badge:'SSCC',      name:'Serial Shipping Container', len:18, fixed:true},
  '01':  {badge:'GTIN',      name:'GTIN / Product',            len:14, fixed:true},
  '02':  {badge:'Content',   name:'GTIN of Contents',          len:14, fixed:true},
  '10':  {badge:'Lot',       name:'Batch / Lot Number',        len:20, fixed:false},
  '11':  {badge:'Prod Date', name:'Production Date',           len:6,  fixed:true, fmt:'date'},
  '12':  {badge:'Due Date',  name:'Due Date',                  len:6,  fixed:true, fmt:'date'},
  '13':  {badge:'Pack Date', name:'Packaging Date',            len:6,  fixed:true, fmt:'date'},
  '15':  {badge:'Best By',   name:'Best Before Date',          len:6,  fixed:true, fmt:'date'},
  '17':  {badge:'Exp Date',  name:'Expiration Date',           len:6,  fixed:true, fmt:'date'},
  '20':  {badge:'Variant',   name:'Product Variant',           len:2,  fixed:true},
  '21':  {badge:'Serial',    name:'Serial Number',             len:20, fixed:false},
  '22':  {badge:'CPV',       name:'Consumer Product Variant',  len:20, fixed:false},
  '30':  {badge:'Count',     name:'Item Count',                len:8,  fixed:false},
  '37':  {badge:'Units',     name:'Units Contained',           len:8,  fixed:false},
  '3102':{badge:'Net kg',    name:'Net Weight (kg)',           len:6,  fixed:true, fmt:'w2'},
  '3202':{badge:'Weight',    name:'Net Weight (lbs)',          len:6,  fixed:true, fmt:'w2'},
  '3302':{badge:'Gross kg',  name:'Gross Weight (kg)',         len:6,  fixed:true, fmt:'w2'},
  '400': {badge:'PO #',      name:'Customer PO Number',        len:30, fixed:false},
  '401': {badge:'Consign',   name:'Consignment Number',        len:30, fixed:false},
  '402': {badge:'Shipment',  name:'Shipment ID',               len:17, fixed:true},
  '403': {badge:'Route',     name:'Routing Code',              len:30, fixed:false},
  '410': {badge:'Ship To',   name:'Ship-To GLN',               len:13, fixed:true},
  '411': {badge:'Bill To',   name:'Bill-To GLN',               len:13, fixed:true},
  '412': {badge:'Buy From',  name:'Purchase From GLN',         len:13, fixed:true},
  '420': {badge:'Postal',    name:'Ship-To Postal Code',       len:20, fixed:false},
  '421': {badge:'Postal+',   name:'Postal w/ Country',         len:15, fixed:false},
  '422': {badge:'Origin',    name:'Country of Origin',         len:3,  fixed:true},
  '7002':{badge:'Meat Cut',  name:'Meat Cut Type',             len:30, fixed:false},
  '90':  {badge:'Internal',  name:'Internal Use',              len:30, fixed:false},
  '91':  {badge:'Cust 91',   name:'Company Internal (91)',      len:30, fixed:false},
  '92':  {badge:'Cust 92',   name:'Company Internal (92)',      len:30, fixed:false},
};
const PRIMARY_AIS = new Set(['01','13','3202','21']);

/* ===== PARSER ===== */
function parseGS1(raw) {
  let data = raw.startsWith(']C1') ? raw.slice(3) : raw;
  const SEP = '\x1d';
  const result = {};
  let i = 0;
  while (i < data.length) {
    if (data[i] === SEP) { i++; continue; }
    let matched = false;
    for (const al of [4,3,2]) {
      const ai = data.substr(i, al);
      if (!GS1_AI[ai]) continue;
      const def = GS1_AI[ai];
      i += al;
      if (def.fixed) {
        result[ai] = data.substr(i, def.len);
        i += def.len;
      } else {
        const end = data.indexOf(SEP, i);
        result[ai] = end === -1 ? data.substr(i) : data.substr(i, end - i);
        i = end === -1 ? data.length : end;
      }
      matched = true; break;
    }
    if (!matched) i++;
  }
  return result;
}

/* ===== FORMATTERS ===== */
function formatDate(s) {
  if (!s || s.length !== 6) return s;
  const mm = s.substr(2,2), dd = s.substr(4,2), yy = s.substr(0,2);
  return `${mm}/${dd}/20${yy}`;
}
function formatW2(s) { return s ? (parseInt(s,10)/100).toFixed(2)+' lbs' : s; }
function applyFmt(v, fmt) {
  if (fmt==='date') return formatDate(v);
  if (fmt==='w2')   return formatW2(v);
  return v;
}
function extractPID(gtin) {
  return (gtin && gtin.length >= 13) ? gtin.substr(8,5) : null;
}
function gtinHTML(gtin) {
  if (!gtin || gtin.length < 14) return gtin||'';
  return gtin.substr(0,8)
    + `<span class="gtin-pid">${gtin.substr(8,5)}</span>`
    + gtin.substr(13);
}

/* ===== DISPLAY ===== */
function displayData(parsed, raw) {
  scanData = {parsed, raw};
  const gtin = parsed['01']||'', date = parsed['13']||'',
        wt   = parsed['3202']||'', ser = parsed['21']||'';
  const pid = extractPID(gtin);

  // Header Product ID
  const pidDisp = document.getElementById('pid-display');
  const pidVal  = document.getElementById('pid-value');
  pidDisp.style.display = 'none'; pidVal.textContent = '';
  if (pid) { pidVal.textContent = pid; pidDisp.style.display = 'flex'; }

  // GTIN
  const gtinEl = document.getElementById('val-gtin');
  if (gtin) {
    gtinEl.innerHTML = gtinHTML(gtin);
    gtinEl.classList.remove('empty');
    document.getElementById('row-gtin').classList.add('filled');
  } else {
    gtinEl.textContent = '—'; gtinEl.classList.add('empty');
    document.getElementById('row-gtin').classList.remove('filled');
  }

  setField('val-date',   'row-date',   date, formatDate);
  setField('val-weight', 'row-weight', wt,   formatW2);
  setField('val-serial', 'row-serial', ser);

  // Extra GS1 fields
  renderExtras(parsed);

  document.getElementById('results-card').classList.add('has-data');
  document.getElementById('confirm-btn').disabled = !(gtin && date);
  flashScreen();
}

function setField(id, rowId, val, fmt) {
  const el = document.getElementById(id), row = document.getElementById(rowId);
  if (val) {
    el.textContent = fmt ? fmt(val) : val;
    el.classList.remove('empty'); row.classList.add('filled');
  } else {
    el.textContent = '—'; el.classList.add('empty'); row.classList.remove('filled');
  }
}

function renderExtras(parsed) {
  const box = document.getElementById('extra-fields');
  box.innerHTML = '';
  const extras = Object.keys(parsed).filter(ai => !PRIMARY_AIS.has(ai));
  extras.forEach(ai => {
    const def  = GS1_AI[ai];
    const name = def ? def.name : `GS1 AI (${ai})`;
    const dval = def ? applyFmt(parsed[ai], def.fmt) : parsed[ai];
    const row  = document.createElement('div');
    row.className = 'field-row filled';
    row.innerHTML = `<div class="field-info"><div class="field-label">${name}</div><div class="field-value">${dval}</div></div>`;
    box.appendChild(row);
  });
}

/* ===== CROP (object-fit:cover aware) ===== */
function getCropCanvas() {
  const vp  = document.getElementById('scan-viewport');
  const vid = document.getElementById('video');
  const cvs = document.getElementById('crop-canvas');
  const cW = vp.clientWidth, cH = vp.clientHeight;
  const vW = vid.videoWidth,  vH = vid.videoHeight;
  if (!vW || !vH) return vid;
  const cAR = cW/cH, vAR = vW/vH;
  let scale, offX=0, offY=0;
  if (vAR > cAR) { scale=vH/cH; offX=(vW-cW*scale)/2; }
  else            { scale=vW/cW; offY=(vH-cH*scale)/2; }
  const fCW=cW*0.92, fCH=cH*0.72;
  const fCX=(cW-fCW)/2, fCY=(cH-fCH)/2;
  const fVX=fCX*scale+offX, fVY=fCY*scale+offY;
  const fVW=fCW*scale,      fVH=fCH*scale;
  cvs.width=Math.round(fVW)||1; cvs.height=Math.round(fVH)||1;
  cvs.getContext('2d').drawImage(vid,fVX,fVY,fVW,fVH,0,0,cvs.width,cvs.height);
  return cvs;
}

/* ===== SCANNER ===== */
function showReady() {
  document.getElementById('scan-ready').style.display = 'flex';
  document.getElementById('scan-viewport').style.display = 'none';
}
function showViewport() {
  document.getElementById('scan-ready').style.display = 'none';
  document.getElementById('scan-viewport').style.display = 'block';
}
function toggleScan() {
  scanning ? (stopScan(), showReady()) : startScan();
}

async function startScan() {
  showViewport(); scanning = true;
  try {
    const vid = document.getElementById('video');
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}
    });
    vid.srcObject = stream; await vid.play();
    if ('BarcodeDetector' in window) {
      const det = new BarcodeDetector({formats:['code_128','ean_13','ean_8','upc_a','upc_e','itf','pdf417']});
      const loop = async () => {
        if (!scanning) return;
        try {
          const bc = await det.detect(getCropCanvas());
          if (bc.length) {
            const parsed = parseGS1(bc[0].rawValue);
            if (Object.keys(parsed).length) {
              stopScan(); showReady();
              displayData(parsed, bc[0].rawValue);
              return;
            }
          }
        } catch(e) {}
        animFrame = requestAnimationFrame(loop);
      };
      animFrame = requestAnimationFrame(loop);
    } else {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
      s.onload = () => {
        const Z = window.ZXing, h = new Map();
        h.set(Z.DecodeHintType.POSSIBLE_FORMATS,[Z.BarcodeFormat.CODE_128,Z.BarcodeFormat.EAN_13]);
        h.set(Z.DecodeHintType.TRY_HARDER,true);
        codeReader = new Z.BrowserMultiFormatReader(h,250);
        codeReader.decodeFromStream(vid.srcObject, vid, (res) => {
          if (res && scanning) {
            const parsed = parseGS1(res.getText());
            if (Object.keys(parsed).length) {
              stopScan(); showReady();
              displayData(parsed, res.getText());
            }
          }
        });
      };
      document.head.appendChild(s);
    }
  } catch(e) { stopScan(); showReady(); }
}

function stopScan() {
  scanning = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (codeReader) { try{codeReader.reset();}catch(e){} codeReader = null; }
  const vid = document.getElementById('video');
  if (vid && vid.srcObject) { vid.srcObject.getTracks().forEach(t=>t.stop()); vid.srcObject=null; }
}

/* ===== CLEAR ===== */
function clearScan() {
  stopScan(); scanData = null;
  document.getElementById('pid-display').style.display = 'none';
  document.getElementById('pid-value').textContent = '';
  ['val-gtin','val-date','val-weight','val-serial'].forEach(id => {
    const el = document.getElementById(id); el.textContent='—'; el.classList.add('empty');
  });
  ['row-gtin','row-date','row-weight','row-serial'].forEach(id =>
    document.getElementById(id).classList.remove('filled'));
  document.getElementById('extra-fields').innerHTML = '';
  document.getElementById('results-card').classList.remove('has-data');
  document.getElementById('confirm-btn').disabled = true;
  showReady();
}

/* ===== INSPECT ===== */
function editInspect() {
  const cur = document.getElementById('val-inspect').textContent.trim();
  const v = prompt('Inspection ID:', cur);
  if (v !== null && v.trim()) document.getElementById('val-inspect').textContent = v.trim();
}

/* ===== CONFIRM ===== */
function confirmScan() {
  if (!scanData) return;
  const payload = {
    productId: extractPID(scanData.parsed['01']||''),
    allFields: scanData.parsed,
    inspectionId: document.getElementById('val-inspect').textContent.trim(),
    confirmedAt: new Date().toISOString()
  };
  console.log('Payload:', payload);
  flashScreen(); showToast('Order confirmed!');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#fff;font-family:'Bebas Neue',sans-serif;
    font-size:.85rem;letter-spacing:2px;padding:10px 20px;border-radius:10px;
    z-index:300;animation:fi .2s ease;white-space:nowrap;`;
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

function flashScreen() {
  const f = document.getElementById('flash');
  f.classList.add('on'); setTimeout(()=>f.classList.remove('on'), 200);
}

/* ===== FULLSCREEN ===== */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
}
document.addEventListener('fullscreenchange', () => {
  const ico = document.getElementById('win-icon');
  if (!ico) return;
  ico.innerHTML = document.fullscreenElement
    ? `<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>`
    : `<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>`;
});
</script>
